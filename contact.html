<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevArena Consulting | Contact</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="container nav-container">
            <h1 class="logo">DevArena</h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container page-content">
        <h2>Contact Us</h2>
        <p class="text-center">Ready to start your project? Fill out the form below.</p>
        
        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe">
                <small class="error-message"></small>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com">
                <small class="error-message"></small>
            </div>
            
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?"></textarea>
                <small class="error-message"></small>
            </div>
            
            <button type="submit" class="btn">Send Message</button>
            <div id="successMessage" class="success-hidden">Thank you! Your message has been sent.</div>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 DevArena Consulting. All rights reserved.</p>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
